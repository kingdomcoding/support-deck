services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:4500:4500"
    networks:
      - shared_pg
      - npm_default
    environment:
      DATABASE_URL: ecto://support_deck:support_deck@shared-postgres/support_deck_prod
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      PHX_HOST: ${PHX_HOST:-supportdeck.josboxoffice.com}
      PHX_SERVER: "true"
      PORT: "4500"
      CREDENTIAL_VAULT_KEY: ${CREDENTIAL_VAULT_KEY}
    command: >
      sh -c "bin/migrate && bin/support_deck start"

networks:
  shared_pg:
    external: true
  npm_default:
    external: true
